kind = "mobile"
previewPath = "/mobile/"
title = "TradeSim Mobile"
version = "1.0.0"
id = "artifacts/trade-sim-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22916

[services.development]
run = "pnpm --filter @workspace/trade-sim-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trade-sim-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/trade-sim-mobile", "run", "serve" ]

[services.env]
PORT = "22916"
BASE_PATH = "/mobile/"
